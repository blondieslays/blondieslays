<section id="custom-order" class="custom-order-section">
  <div class="container">
    <h3 class="text-center custom-order-title">Build Your Shirt</h3>
    <p class="text-center custom-order-intro">Got a vision? Let's make it real. Fill out the form below and Elise will be in touch with a quote within 48 hours.</p>

    <div class="order-form-card">
      <form action="https://formspree.io/f/xwvzyblg" method="POST" class="order-form">

        <div class="form-row">
          <div class="form-group">
            <label>Your Name</label>
            <input type="text" name="name" placeholder="Elise Marion" required>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="you@email.com" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Garment Type</label>
            <select name="garment">
              <option value="">Select one...</option>
              <option>T-Shirt</option>
              <option>Hoodie</option>
              <option>Crewneck</option>
              <option>Tank Top</option>
              <option>Hat / Cap</option>
              <option>Tote Bag</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Quantity</label>
            <select name="quantity">
              <option value="">Select one...</option>
              <option>1 (one-off)</option>
              <option>2–5</option>
              <option>6–12</option>
              <option>13–25</option>
              <option>25+</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Colour Preference</label>
            <input type="text" name="colour" placeholder="e.g. black, white, sage green">
          </div>
          <div class="form-group">
            <label>Size(s) Needed</label>
            <input type="text" name="sizes" placeholder="e.g. S, M, L, XL">
          </div>
        </div>

        <div class="form-group full-width">
          <label>Design Description</label>
          <textarea name="design" rows="4" placeholder="Describe your design idea — text, logos, colours, placement, anything you have in mind. You can also email images to elisedaniellemarion@gmail.com." required></textarea>
        </div>

        <div class="form-group full-width">
          <label>Timeline / Any other details</label>
          <textarea name="details" rows="2" placeholder="When do you need it? Any special requirements?"></textarea>
        </div>

        <div class="text-center">
          <button type="submit" class="order-submit-btn">Send My Order Request</button>
        </div>

      </form>
    </div>
  </div>
</section>
