<footer style="background:#FFF8F5 !important; margin-top:4rem; width:100%;">
  <div style="max-width:900px; margin:0 auto; padding:2.5rem 1.5rem 1.5rem; text-align:center; background:#FFF8F5 !important;">
    <a href="/">
      <img src="/images/logo.png" alt="Blondie Slays Apparel" height="60px" style="margin-bottom:1rem;">
    </a>
    <div style="display:flex; justify-content:center; gap:2rem; flex-wrap:wrap; margin-bottom:1.5rem;">
      <a href="/#projects" style="font-family:Montserrat,sans-serif; font-size:0.78rem; font-weight:600; color:#1a1a1a; text-decoration:none; letter-spacing:0.04em; text-transform:uppercase;">Shop</a>
      <a href="/downloads/" style="font-family:Montserrat,sans-serif; font-size:0.78rem; font-weight:600; color:#1a1a1a; text-decoration:none; letter-spacing:0.04em; text-transform:uppercase;">Digital Downloads</a>
      <a href="/#contact" style="font-family:Montserrat,sans-serif; font-size:0.78rem; font-weight:600; color:#1a1a1a; text-decoration:none; letter-spacing:0.04em; text-transform:uppercase;">Get in Touch</a>
    </div>
    <div style="display:flex; justify-content:center; gap:1rem; margin-bottom:1.5rem;">
      {{ if .Site.Params.footer.socialNetworks.linkedin }}
      <a href="{{ .Site.Params.footer.socialNetworks.linkedin }}" target="_blank" aria-label="linkedin">
        <svg xmlns="http://www.w3.org/2000/svg" width="1.8rem" height="1.8rem" viewBox="0 0 512 512">
          <rect width="512" height="512" fill="#0077b5" rx="15%"/>
          <circle cx="142" cy="138" r="37" fill="#fff"/>
          <path stroke="#fff" stroke-width="66" d="M244 194v198M142 194v198"/>
          <path fill="#fff" d="M276 282c0-20 13-40 36-40 24 0 33 18 33 45v105h66V279c0-61-32-89-76-89-34 0-51 19-59 32"/>
        </svg>
      </a>
      {{ end }}
      {{ if .Site.Params.footer.socialNetworks.instagram }}
      <a href="{{ .Site.Params.footer.socialNetworks.instagram }}" target="_blank" aria-label="instagram">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="1.8rem" height="1.8rem">
          <radialGradient id="ig-footer" cx="19.38" cy="42.035" r="44.899" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#fd5"/><stop offset=".328" stop-color="#ff543f"/>
            <stop offset=".504" stop-color="#e64771"/><stop offset=".841" stop-color="#c837ab"/>
          </radialGradient>
          <path fill="url(#ig-footer)" d="M34,42H14c-4.4,0-8-3.6-8-8V14c0-4.4,3.6-8,8-8h20c4.4,0,8,3.6,8,8v20C42,38.4,38.4,42,34,42z"/>
          <path fill="#fff" d="M24,31c-3.9,0-7-3.1-7-7s3.1-7,7-7s7,3.1,7,7S27.9,31,24,31z M24,19c-2.8,0-5,2.2-5,5s2.2,5,5,5s5-2.2,5-5S26.8,19,24,19z"/>
          <circle cx="31.5" cy="16.5" r="1.5" fill="#fff"/>
          <path fill="#fff" d="M30,37H18c-3.9,0-7-3.1-7-7V18c0-3.9,3.1-7,7-7h12c3.9,0,7,3.1,7,7v12C37,33.9,33.9,37,30,37z M18,13c-2.8,0-5,2.2-5,5v12c0,2.8,2.2,5,5,5h12c2.8,0,5-2.2,5-5V18c0-2.8-2.2-5-5-5H18z"/>
        </svg>
      </a>
      {{ end }}
    </div>
    <div style="font-family:Montserrat,sans-serif; font-size:0.72rem; color:#aaa; padding-top:0.5rem;">
      &copy; {{ now.Format "2006" }} Blondie Slays Apparel. All rights reserved.
    </div>
  </div>
</footer>
